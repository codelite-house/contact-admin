replicaCount: 1

image:
  repository: ghcr.io/codelite-house/contact-admin
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets:
  - name: ghcr-pull-secret

service:
  type: ClusterIP
  port: 80
  targetPort: 80

ingress:
  enabled: false
  className: haproxy-admin
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    haproxy.org/ssl-redirect: "true"
  hosts: []
  tls: []

# K8s secret tworzony przez Terraform (contact-admin-zitadel).
# Zawiera: ZITADEL_ISSUER, ZITADEL_CLIENT_ID, API_URL.
existingSecret: ""

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"
